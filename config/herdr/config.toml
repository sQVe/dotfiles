onboarding = false

[keys]
# ctrl+b chosen over ctrl+a (vim increment) and ctrl+s (zsh edit-command-line +
# nvim spell).
close_pane = ["prefix+q", "ctrl+shift+q"]
close_tab = ""
close_workspace = ["prefix+d", "ctrl+shift+d"]
cycle_pane_next = ["prefix+l", "ctrl+shift+l"]
cycle_pane_previous = ["prefix+h", "ctrl+shift+h"]
detach = ["prefix+z", "ctrl+shift+z"]
focus_pane_down = ""                                             # disabled
focus_pane_left = ""                                             # disabled
focus_pane_right = ""                                            # disabled
focus_pane_up = ""                                               # disabled
goto = ["prefix+g", "ctrl+shift+g"]
navigate_pane_down = ""                                          # disabled
navigate_pane_left = ""                                          # disabled
navigate_pane_right = ""                                         # disabled
navigate_pane_up = ""                                            # disabled
navigate_workspace_down = "j"
navigate_workspace_up = "k"
new_tab = ["prefix+t", "ctrl+shift+t"]
new_workspace = ["prefix+n", "ctrl+shift+n", "ctrl+shift+enter"]
new_worktree = ""                                                # disabled
next_tab = ["prefix+tab", "ctrl+shift+tab"]
next_workspace = ["prefix+j", "ctrl+shift+j"]
prefix = "ctrl+b"
previous_tab = ""                                                # disabled
previous_workspace = ["prefix+k", "ctrl+shift+k"]
reload_config = ""                                               # disabled
rename_tab = ""                                                  # disabled
rename_workspace = ["prefix+r", "ctrl+shift+r"]
resize_mode = ["prefix+f", "ctrl+shift+f"]
settings = ""                                                    # disabled
split_horizontal = "prefix+s"
split_vertical = "prefix+v"
switch_tab = "ctrl+shift+1..9"
workspace_picker = ["prefix+w", "ctrl+shift+w"]
zoom = "prefix+m"

[terminal]
default_shell = "zsh"

[theme]
name = "catppuccin-latte"

[ui]
agent_panel_scope = "current"
show_agent_labels_on_pane_borders = true
sidebar_max_width = 54
sidebar_min_width = 18
sidebar_width = 38

agent_panel_sort = "priority"
[ui.toast]
delivery = "terminal"

[ui.sound]
enabled = false

[session]
resume_agents_on_restore = true

[experimental]
allow_nested = false
pane_history = true
