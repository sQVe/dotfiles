# Font specific.
font_family      family='Maple Mono' style='Light'
bold_font        family='Maple Mono' style='SemiBold'
italic_font      family='Maple Mono' style='Light Italic'
bold_italic_font family='Maple Mono' style='SemiBold Italic'
font_size        11

# Font modifiers.
modify_font underline_position 1

# Sizing.
remember_window_size no
window_padding_width 4 8 4 8

# Interface.
enabled_layouts splits
tab_bar_style powerline
tab_powerline_style round
tab_title_template " {title} "

# Scroll.
touch_scroll_multiplier 2.0
wheel_scroll_multiplier 5.0

# Scrollback.
scrollback_pager $SCRIPTS/kitty/neovim-scrollback.sh INPUT_LINE_NUMBER CURSOR_LINE CURSOR_COLUMN

# Cursor.
cursor_blink_interval        0

# Misc.
allow_remote_control    yes
listen_on               unix:/tmp/kitty-$USER
confirm_os_window_close 0
enable_audio_bell       no
open_url_with           mimeo
shell_integration       disabled
kitten_alias            hints hints --hints-foreground-color=#eff1f5 --hints-background-color=#5858a0
update_check_interval   0

# Color theme (Catppuccin Latte Muted - cool slate).
active_border_color     #5858a0
active_tab_background   #d4d6de
active_tab_foreground   #7c32a8
background              #d6d6d6
color0                  #2d3040
color1                  #b82530
color2                  #287028
color3                  #806010
color4                  #2850a8
color5                  #984080
color6                  #207068
color7                  #868998
color8                  #3e4152
color9                  #b82530
color10                 #287028
color11                 #806010
color12                 #2850a8
color13                 #984080
color14                 #207068
color15                 #999ca7
cursor                  #1e2028
cursor_text_color       #d4d6de
foreground              #1e2028
inactive_border_color   #747787
inactive_tab_background #cbcdd5
inactive_tab_foreground #747787
selection_background    #8b8ea0
selection_foreground    #d4d6de
url_color               #2850a8

# Keymaps.
map kitty_mod+p>e open_url_with_hints
map kitty_mod+p>o kitten hints --type path
map kitty_mod+p>p kitten hints --type path --program -

map kitty_mod+s show_scrollback

map kitty_mod+u scroll_page_up
map kitty_mod+d scroll_page_down

map kitty_mod+w>kitty_mod+q close_window
map kitty_mod+w>q           close_window

map kitty_mod+w>kitty_mod+o close_other_windows_in_tab
map kitty_mod+w>o           close_other_windows_in_tab

map kitty_mod+w>kitty_mod+d detach_window
map kitty_mod+w>d           detach_window

# New-window-at-cwd lives on niri's Mod+Shift+Return (kitty-cwd.sh); kitty's
# own new_os_window_with_cwd reports herdr's CWD, not the focused pane's. Unmap
# (no action) so the key passes through instead of falling back to kitty's
# default new_window, which opens a split.
map kitty_mod+enter

# Unbind kitty's default pane navigation keymaps so that they don't swallow bindings from multiplexers.
map kitty_mod+[
map kitty_mod+]
map kitty_mod+0
map kitty_mod+1
map kitty_mod+2
map kitty_mod+3
map kitty_mod+4
map kitty_mod+5
map kitty_mod+6
map kitty_mod+7
map kitty_mod+8
map kitty_mod+9
map kitty_mod+a
map kitty_mod+b
map kitty_mod+e
map kitty_mod+f
map kitty_mod+g
map kitty_mod+h
map kitty_mod+j
map kitty_mod+k
map kitty_mod+l
map kitty_mod+left
map kitty_mod+n
map kitty_mod+o
map kitty_mod+q
map kitty_mod+r
map kitty_mod+right
map kitty_mod+t
map kitty_mod+w
map kitty_mod+x
map kitty_mod+z
