# Perles Configuration

auto_refresh: true

ui:
  vim_mode: true
  markdown_style: light

theme:
  preset: catppuccin-latte

views:
  - name: Default
    columns:
      - name: Blocked
        type: bql
        query: 'status = open and blocked = true'
        color: '#b82530'

      - name: Ready
        type: bql
        query: 'status = open and ready = true'
        color: '#287028'

      - name: In Progress
        type: bql
        query: 'status = in_progress'
        color: '#2850a8'

      - name: Closed
        type: bql
        query: 'status = closed'
        color: '#7c32a8'
